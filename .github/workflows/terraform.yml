name: 'Terraform'

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:

  bootstrap:
    name: Terraform Bootstrap
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: terraform_bootstrap

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply Bootstrap
      run: |
        terraform apply -auto-approve -input=false \
          -var="repo_name=${{ github.event.repository.name }}" \
          -var="branch_name=${{ github.ref_name }}"

  terraform:
    name: Terraform AWS Resources
    runs-on: ubuntu-latest
    needs: bootstrap   # 🔥 ensures bootstrap runs first
    environment: production

    defaults:
      run:
        working-directory: aws_resources

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔥 DEBUG STEP
    - name: Debug folder structure
      run: |
        pwd
        ls -R

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=${{ github.event.repository.name }}-terraform-state-${{ github.ref_name }}" \
          -backend-config="key=terraform.tfstate" \
          -backend-config="region=ap-southeast-1"

    - name: Terraform Plan
      run: terraform plan -input=false -var="branch_name=${{ github.ref_name }}"

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve -input=false -var="branch_name=${{ github.ref_name }}"