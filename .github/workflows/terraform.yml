name: Terraform

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:

  ############################################################
  # BOOTSTRAP BACKEND
  ############################################################
  bootstrap:
    name: Bootstrap Terraform Backend
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: terraform_bootstrap

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      ########################################################
      # SAFE BACKEND NAME GENERATION (FIXED)
      ########################################################
      - name: Generate Backend Names
        working-directory: ${{ github.workspace }}
        run: |
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          echo "TF_BUCKET=${REPO_NAME}-terraform-state" >> $GITHUB_ENV
          echo "TF_LOCK_TABLE=${REPO_NAME}-terraform-lock" >> $GITHUB_ENV

      ########################################################
      # CHECK BACKEND EXISTENCE
      ########################################################
      - name: Check Backend Resources
        id: backend-check
        run: |
          if aws s3api head-bucket --bucket "$TF_BUCKET" 2>/dev/null; then
            echo "bucket_exists=true" >> $GITHUB_OUTPUT
          else
            echo "bucket_exists=false" >> $GITHUB_OUTPUT
          fi

          if aws dynamodb describe-table \
            --table-name "$TF_LOCK_TABLE" \
            --region "$AWS_REGION" \
            >/dev/null 2>&1; then
            echo "table_exists=true" >> $GITHUB_OUTPUT
          else
            echo "table_exists=false" >> $GITHUB_OUTPUT
          fi

      ########################################################
      # CREATE BACKEND ONLY IF MISSING
      ########################################################
      - name: Terraform Init
        if: steps.backend-check.outputs.bucket_exists == 'false' || steps.backend-check.outputs.table_exists == 'false'
        run: terraform init

      - name: Terraform Apply Bootstrap
        if: steps.backend-check.outputs.bucket_exists == 'false' || steps.backend-check.outputs.table_exists == 'false'
        run: |
          terraform apply -auto-approve -input=false \
            -var="bucket_name=$TF_BUCKET" \
            -var="lock_table_name=$TF_LOCK_TABLE"

  ############################################################
  # MAIN TERRAFORM DEPLOYMENT
  ############################################################
  terraform:
    name: Deploy AWS Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      ########################################################
      # GENERATE BACKEND NAMES (FIXED)
      ########################################################
      - name: Generate Backend Names
        working-directory: ${{ github.workspace }}
        run: |
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          echo "TF_BUCKET=${REPO_NAME}-terraform-state" >> $GITHUB_ENV
          echo "TF_LOCK_TABLE=${REPO_NAME}-terraform-lock" >> $GITHUB_ENV

      ########################################################
      # DEBUG (SAFE)
      ########################################################
      - name: Debug Folder Structure
        run: |
          pwd
          ls -R

      ########################################################
      # TERRAFORM STEPS (FIXED DIRECTORY)
      ########################################################

      - name: Terraform Format Check
        working-directory: ./aws-resource
        run: terraform fmt -check

      - name: Terraform Init
        working-directory: ./aws-resource
        run: |
          terraform init \
            -backend-config="bucket=$TF_BUCKET" \
            -backend-config="key=${{ github.ref_name }}/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"

      - name: Terraform Validate
        working-directory: ./aws-resource
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./aws-resource
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: ./aws-resource
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan