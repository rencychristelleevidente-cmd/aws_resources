name: Terraform

on:
  push:
    branches:
      - main
      - dev
      - 'feature-**'

  pull_request:

  workflow_dispatch:
    inputs:
      action:
        description: "Choose terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:

  ############################################################
  # BOOTSTRAP BACKEND
  ############################################################
  bootstrap:
    name: Bootstrap Terraform Backend
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: terraform_bootstrap

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate Backend Names
        working-directory: ${{ github.workspace }}
        run: |
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          SAFE_BRANCH=$(echo "${{ github.ref_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr '/' '-' \
            | tr '_' '-')

          echo "TF_BUCKET=${REPO_NAME}-terraform-state" >> $GITHUB_ENV
          echo "TF_LOCK_TABLE=${REPO_NAME}-terraform-lock" >> $GITHUB_ENV
          echo "SAFE_BRANCH=${SAFE_BRANCH}" >> $GITHUB_ENV

      - name: Check Backend Resources
        id: backend-check
        run: |
          if aws s3api head-bucket --bucket "$TF_BUCKET" 2>/dev/null; then
            echo "bucket_exists=true" >> $GITHUB_OUTPUT
          else
            echo "bucket_exists=false" >> $GITHUB_OUTPUT
          fi

          if aws dynamodb describe-table \
            --table-name "$TF_LOCK_TABLE" \
            --region "$AWS_REGION" \
            >/dev/null 2>&1; then
            echo "table_exists=true" >> $GITHUB_OUTPUT
          else
            echo "table_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        if: steps.backend-check.outputs.bucket_exists == 'false' || steps.backend-check.outputs.table_exists == 'false'
        run: terraform init

      - name: Terraform Apply Bootstrap
        if: steps.backend-check.outputs.bucket_exists == 'false' || steps.backend-check.outputs.table_exists == 'false'
        run: |
          terraform apply -auto-approve -input=false \
            -var="bucket_name=$TF_BUCKET" \
            -var="lock_table_name=$TF_LOCK_TABLE"

  ############################################################
  # MAIN TERRAFORM DEPLOYMENT
  ############################################################
  terraform:
    name: Deploy AWS Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap
    environment: production

    if: |
      github.event_name == 'push' ||
      github.event.inputs.action == 'apply'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate Backend Names
        working-directory: ${{ github.workspace }}
        run: |
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          SAFE_BRANCH=$(echo "${{ github.ref_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr '/' '-' \
            | tr '_' '-')

          echo "TF_BUCKET=${REPO_NAME}-terraform-state" >> $GITHUB_ENV
          echo "TF_LOCK_TABLE=${REPO_NAME}-terraform-lock" >> $GITHUB_ENV
          echo "SAFE_BRANCH=${SAFE_BRANCH}" >> $GITHUB_ENV

      - name: Terraform Format Check
        working-directory: aws-resources
        run: terraform fmt -check

      - name: Terraform Init
        working-directory: aws-resources
        run: |
          terraform init \
            -backend-config="bucket=$TF_BUCKET" \
            -backend-config="key=$SAFE_BRANCH/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"

      - name: Terraform Validate
        working-directory: aws-resources
        run: terraform validate

      - name: Terraform Plan
        working-directory: aws-resources
        run: |
          terraform plan \
            -input=false \
            -var="branch_name=$SAFE_BRANCH" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: aws-resources
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            tfplan

  ############################################################
  # TERRAFORM DESTROY
  ############################################################
  destroy:
    name: Destroy AWS Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap

    if: github.event.inputs.action == 'destroy'

    ##########################################################
    # IMPORTANT:
    # Create GitHub Environment:
    # destroy-approval
    #
    # Add Required Reviewers
    #
    # This creates the manual approval button
    ##########################################################
    environment:
      name: destroy-approval

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate Backend Names
        working-directory: ${{ github.workspace }}
        run: |
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          SAFE_BRANCH=$(echo "${{ github.ref_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr '/' '-' \
            | tr '_' '-')

          echo "TF_BUCKET=${REPO_NAME}-terraform-state" >> $GITHUB_ENV
          echo "TF_LOCK_TABLE=${REPO_NAME}-terraform-lock" >> $GITHUB_ENV
          echo "SAFE_BRANCH=${SAFE_BRANCH}" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: aws-resources
        run: |
          terraform init \
            -backend-config="bucket=$TF_BUCKET" \
            -backend-config="key=$SAFE_BRANCH/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"

      - name: Terraform Destroy Plan
        working-directory: aws-resources
        run: |
          terraform plan -destroy \
            -var="branch_name=$SAFE_BRANCH"

      - name: Terraform Destroy
        working-directory: aws-resources
        run: |
          terraform destroy \
            -auto-approve \
            -input=false \
            -var="branch_name=$SAFE_BRANCH"